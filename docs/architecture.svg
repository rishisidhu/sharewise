<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Sharewise architecture: PWA to Apps Script gatekeeper to private Google Sheet">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b5b95"/>
    </marker>
  </defs>

  <rect width="820" height="260" fill="#ffffff"/>

  <!-- PWA -->
  <rect x="30" y="80" width="210" height="100" rx="12" fill="#f3f0fa" stroke="#6b5b95" stroke-width="2"/>
  <text x="135" y="118" text-anchor="middle" font-size="18" font-weight="600" fill="#2d2a3a">PWA</text>
  <text x="135" y="142" text-anchor="middle" font-size="12.5" fill="#5b5670">Installable web app</text>
  <text x="135" y="160" text-anchor="middle" font-size="12.5" fill="#5b5670">Google sign-in + entry</text>

  <!-- Gatekeeper -->
  <rect x="305" y="80" width="210" height="100" rx="12" fill="#f3f0fa" stroke="#6b5b95" stroke-width="2"/>
  <text x="410" y="112" text-anchor="middle" font-size="18" font-weight="600" fill="#2d2a3a">Apps Script</text>
  <text x="410" y="132" text-anchor="middle" font-size="18" font-weight="600" fill="#2d2a3a">gatekeeper</text>
  <text x="410" y="156" text-anchor="middle" font-size="12.5" fill="#5b5670">Verifies identity</text>
  <text x="410" y="173" text-anchor="middle" font-size="12.5" fill="#5b5670">2-person allowlist</text>

  <!-- Sheet -->
  <rect x="580" y="80" width="210" height="100" rx="12" fill="#eef6ef" stroke="#3f7d52" stroke-width="2"/>
  <text x="685" y="112" text-anchor="middle" font-size="18" font-weight="600" fill="#26331f">Private</text>
  <text x="685" y="132" text-anchor="middle" font-size="18" font-weight="600" fill="#26331f">Google Sheet</text>
  <text x="685" y="156" text-anchor="middle" font-size="12.5" fill="#3f5b3f">Data + analysis</text>
  <text x="685" y="173" text-anchor="middle" font-size="12.5" fill="#3f5b3f">(the database)</text>

  <!-- Arrows -->
  <line x1="240" y1="130" x2="305" y2="130" stroke="#6b5b95" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="515" y1="130" x2="580" y2="130" stroke="#6b5b95" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="272" y="120" text-anchor="middle" font-size="11" fill="#6b5b95">expense</text>
  <text x="272" y="155" text-anchor="middle" font-size="11" fill="#6b5b95">+ token</text>
  <text x="547" y="120" text-anchor="middle" font-size="11" fill="#6b5b95">append</text>
  <text x="547" y="155" text-anchor="middle" font-size="11" fill="#6b5b95">row</text>

  <text x="410" y="40" text-anchor="middle" font-size="15" font-weight="600" fill="#2d2a3a">Sharewise data flow</text>
  <text x="410" y="222" text-anchor="middle" font-size="12" fill="#8a8598">No backend server of its own — the sheet is the database and does the analysis.</text>
</svg>
