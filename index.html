<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#3D2645" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sharewise" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<title>Sharewise</title>
<!-- build-time config (endpoint + client id); generated by build.js -->
<script src="config.js"></script>
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --plum:#3D2645; --plum2:#5A3B66; --gold:#C9A227; --gold-deep:#A8851A;
    --cream:#F7F3EC; --soft:#EDE6DB; --ink:#2B2230; --paper:#FCFAF6;
    --muted:#9b8f86; --line:#E4DBCD; --ok:#3F7D5A; --err:#A8425B;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--cream); color:var(--ink);
    min-height:100vh; min-height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  /* ---------- gate / sign-in ---------- */
  #gate{
    position:fixed; inset:0; background:var(--plum); color:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:30px; z-index:50;
  }
  #gate .eyebrow{font-size:12px; letter-spacing:3px; color:var(--gold); font-weight:700;}
  #gate h1{font-family:Georgia,"Times New Roman",serif; font-size:40px; margin:8px 0 4px; font-weight:700;}
  #gate p{color:#cbb9d4; font-size:14px; max-width:300px; line-height:1.5; margin:0 0 28px;}
  #gate .mark{
    width:64px; height:64px; border-radius:18px; background:var(--gold); color:var(--plum);
    display:grid; place-items:center; font-family:Georgia,serif; font-weight:700; font-size:32px;
    margin-bottom:18px; box-shadow:0 8px 24px rgba(0,0,0,.25);
  }
  #gateMsg{margin-top:18px; font-size:13px; color:#e6b8c4; min-height:18px;}
  .gbtn-wrap{min-height:44px;}

  /* ---------- app shell ---------- */
  header.bar{
    background:var(--plum); color:#fff;
    padding:calc(env(safe-area-inset-top) + 16px) 18px 14px;
  }
  .bar-top{max-width:560px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;}
  .bar-top .eyebrow{font-size:11px; letter-spacing:2px; color:var(--gold); font-weight:700;}
  .bar-top h1{font-family:Georgia,serif; font-size:22px; margin:2px 0 0; font-weight:700;}
  .who{display:flex; align-items:center; gap:8px; font-size:12px; color:#cbb9d4;}
  .who img{width:30px; height:30px; border-radius:50%; border:2px solid var(--gold);}
  .signout{background:none; border:none; color:#cbb9d4; font-size:11px; text-decoration:underline; cursor:pointer; padding:0;}

  main{max-width:560px; margin:0 auto; padding:18px 16px 90px;}

  .card{background:var(--paper); border:1px solid var(--soft); border-radius:var(--radius); padding:18px;}
  label.field{display:block; margin-bottom:14px;}
  label.field > span{display:block; font-size:12px; font-weight:600; color:var(--plum2); margin-bottom:5px;}
  input,select,textarea{
    width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px;
    background:#fff; font-size:16px; color:var(--ink); outline:none; font-family:inherit;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--plum2); box-shadow:0 0 0 3px rgba(90,59,102,.12);}
  textarea{resize:vertical; min-height:48px;}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  /* amount as the hero input */
  .amount-hero{margin-bottom:16px;}
  .amount-hero span.lab{font-size:12px; font-weight:600; color:var(--plum2); display:block; margin-bottom:4px;}
  .amount-wrap{display:flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:12px; background:#fff; padding:6px 14px;}
  .amount-wrap:focus-within{border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,39,.15);}
  .amount-wrap .rs{font-family:Georgia,serif; font-size:30px; color:var(--plum2);}
  .amount-wrap input{border:none; box-shadow:none !important; font-family:Georgia,serif; font-size:34px; font-weight:700; color:var(--plum); padding:6px 0;}

  /* segmented controls */
  .seg{display:flex; gap:6px;}
  .seg button{
    flex:1; padding:10px 4px; border:1px solid var(--line); background:#fff; border-radius:10px;
    font-size:13px; font-weight:600; color:var(--plum2); cursor:pointer; font-family:inherit;
  }
  .seg button.on{background:var(--plum); color:#fff; border-color:var(--plum);}
  .seg.gold button.on{background:var(--gold); color:var(--ink); border-color:var(--gold-deep);}

  .impulse{
    display:flex; align-items:center; gap:10px; padding:12px 14px; border:1px solid var(--line);
    border-radius:10px; cursor:pointer; margin-bottom:6px; background:#fff;
  }
  .impulse.on{background:#fbf1d6; border-color:var(--gold);}
  .impulse input{width:auto;}
  .impulse span{font-size:14px;}

  .submit{
    width:100%; margin-top:6px; padding:15px; border:none; border-radius:12px;
    background:var(--plum); color:#fff; font-size:16px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit;
  }
  .submit:disabled{opacity:.55; cursor:default;}
  .submit .spin{width:18px; height:18px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}

  /* toast */
  #toast{
    position:fixed; left:50%; bottom:calc(24px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
    background:var(--plum); color:#fff; padding:13px 20px; border-radius:12px; font-size:14px; font-weight:600;
    box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:.25s; z-index:60; max-width:90vw; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  #toast.ok{background:var(--ok);} #toast.err{background:var(--err);}

  .hint{font-size:12px; color:var(--muted); text-align:center; margin-top:14px; line-height:1.5;}
  .hidden{display:none !important;}

  /* recent strip */
  .recent{margin-top:18px;}
  .recent h2{font-family:Georgia,serif; font-size:15px; color:var(--plum); margin:0 0 8px;}
  .recent .item{display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--paper); border:1px solid var(--soft); border-radius:10px; margin-bottom:7px;}
  .recent .dot{width:6px; align-self:stretch; border-radius:4px; background:var(--gold);}
  .recent .it-main{flex:1; min-width:0;}
  .recent .it-main .t{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .recent .it-main .s{font-size:11.5px; color:var(--muted);}
  .recent .amt{font-family:Georgia,serif; font-weight:700; color:var(--plum);}
</style>
</head>
<body>

<!-- ============ SIGN-IN GATE ============ -->
<div id="gate">
  <div class="mark">S</div>
  <div class="eyebrow">HOUSEHOLD LEDGER</div>
  <h1>Sharewise</h1>
  <p>Log an expense in seconds. It lands straight in your shared sheet, where the analysis lives.</p>
  <div class="gbtn-wrap"><div id="gbtn"></div></div>
  <div id="gateMsg"></div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <header class="bar">
    <div class="bar-top">
      <div>
        <div class="eyebrow">HOUSEHOLD LEDGER</div>
        <h1>Add an expense</h1>
      </div>
      <div class="who">
        <img id="avatar" alt="" />
        <div>
          <div id="whoName"></div>
          <button class="signout" id="signout">sign out</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="amount-hero">
        <span class="lab">Amount</span>
        <div class="amount-wrap">
          <span class="rs">₹</span>
          <input id="amount" type="number" inputmode="decimal" placeholder="0" />
        </div>
      </div>

      <label class="field">
        <span>What was it?</span>
        <input id="item" type="text" placeholder="e.g. Swiggy dinner, diapers, electricity" />
      </label>

      <label class="field">
        <span>Category</span>
        <select id="category"></select>
      </label>

      <div class="row">
        <label class="field">
          <span>Date</span>
          <input id="date" type="date" />
        </label>
        <label class="field">
          <span>Payment</span>
          <select id="payment">
            <option>UPI</option><option>Card</option><option>Cash</option><option>Net Banking</option>
          </select>
        </label>
      </div>

      <label class="field">
        <span>Who paid?</span>
        <div class="seg" id="paidBy">
          <button data-v="You">You</button>
          <button data-v="Wife">Wife</button>
          <button data-v="Shared" class="on">Shared</button>
        </div>
      </label>

      <label class="field">
        <span>Whose expense? (split)</span>
        <div class="seg gold" id="split">
          <button data-v="You">You</button>
          <button data-v="Wife">Wife</button>
          <button data-v="Shared" class="on">Shared</button>
        </div>
      </label>

      <label class="impulse" id="impulseRow">
        <input id="impulse" type="checkbox" />
        <span>Impulse buy?</span>
      </label>

      <label class="field" style="margin-top:14px;">
        <span>Notes (optional)</span>
        <textarea id="notes" placeholder="anything worth remembering"></textarea>
      </label>

      <button class="submit" id="save">Add expense</button>
    </div>

    <div class="recent hidden" id="recentBox">
      <h2>Added this session</h2>
      <div id="recentList"></div>
    </div>

    <p class="hint">Entries are saved to your shared Google Sheet.<br>Open the sheet anytime to see the full analysis.</p>
  </main>
</div>

<div id="toast"></div>

<script>
  // ============================================================
  //  CONFIG  — these two values are injected at build time by
  //  Vercel (see config.js). Do NOT hardcode secrets in the repo.
  // ============================================================
  const ENDPOINT  = (window.SHAREWISE_CONFIG && window.SHAREWISE_CONFIG.endpoint)  || "";
  const CLIENT_ID = (window.SHAREWISE_CONFIG && window.SHAREWISE_CONFIG.clientId) || "";

  let idToken = null;
  const $ = (id) => document.getElementById(id);

  // ---------- toast ----------
  let toastTimer;
  function toast(msg, kind){
    const t = $("toast");
    t.textContent = msg;
    t.className = "show " + (kind || "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> t.className = (kind||""), 2600);
  }

  // ---------- Google sign-in ----------
  function decodeJwt(tok){
    try{ return JSON.parse(atob(tok.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))); }
    catch(e){ return {}; }
  }

  function onSignIn(resp){
    idToken = resp.credential;
    const p = decodeJwt(idToken);
    $("avatar").src = p.picture || "";
    $("whoName").textContent = (p.given_name || p.name || "").split(" ")[0];
    $("gate").classList.add("hidden");
    $("app").classList.remove("hidden");
    loadCategories();
  }

  window.onload = function(){
    $("date").value = new Date().toISOString().slice(0,10);

    if(!ENDPOINT || !CLIENT_ID){
      $("gateMsg").textContent = "App not configured yet — set the endpoint and client ID in Vercel.";
      return;
    }
    // wait for the GIS script
    const ready = setInterval(()=>{
      if(window.google && google.accounts && google.accounts.id){
        clearInterval(ready);
        google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onSignIn });
        google.accounts.id.renderButton($("gbtn"), {
          theme:"filled_black", size:"large", shape:"pill", text:"continue_with", width:260
        });
      }
    }, 120);
  };

  $("signout").onclick = function(){
    idToken = null;
    if(window.google && google.accounts) google.accounts.id.disableAutoSelect();
    $("app").classList.add("hidden");
    $("gate").classList.remove("hidden");
  };

  // ---------- segmented controls ----------
  function wireSeg(id){
    const grp = $(id);
    grp.querySelectorAll("button").forEach(b=>{
      b.onclick = (e)=>{ e.preventDefault();
        grp.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
        b.classList.add("on");
      };
    });
    return ()=> grp.querySelector("button.on").dataset.v;
  }
  const getPaidBy = wireSeg("paidBy");
  const getSplit  = wireSeg("split");

  $("impulseRow").addEventListener("click", ()=>{
    setTimeout(()=> $("impulseRow").classList.toggle("on", $("impulse").checked), 0);
  });

  // ---------- categories from the sheet (Settings tab) ----------
  const FALLBACK = ["Groceries","Eating Out / Delivery","Blinkit / Quick-commerce","Baby",
    "Rent / Housing","Utilities","Transport","Health","Shopping","Entertainment",
    "Subscriptions","Travel","Other"];

  function fillCategories(list){
    const sel = $("category");
    sel.innerHTML = "";
    (list && list.length ? list : FALLBACK).forEach(c=>{
      const o = document.createElement("option"); o.textContent = c; sel.appendChild(o);
    });
  }

  async function loadCategories(){
    fillCategories(FALLBACK); // show immediately, refresh if the sheet answers
    try{
      const url = ENDPOINT + "?idToken=" + encodeURIComponent(idToken);
      const r = await fetch(url, { method:"GET" });
      const data = await r.json();
      if(data && data.ok && data.categories) fillCategories(data.categories);
    }catch(e){ /* keep fallback */ }
  }

  // ---------- submit ----------
  const recent = [];
  function renderRecent(){
    if(!recent.length) return;
    $("recentBox").classList.remove("hidden");
    $("recentList").innerHTML = recent.map(e=>`
      <div class="item">
        <div class="dot"></div>
        <div class="it-main">
          <div class="t">${escapeHtml(e.item)}</div>
          <div class="s">${e.category} · ${e.paidBy===e.split?e.paidBy:e.paidBy+"→"+e.split}</div>
        </div>
        <div class="amt">₹${Number(e.amount).toLocaleString("en-IN")}</div>
      </div>`).join("");
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  $("save").onclick = async function(){
    const amount = Number($("amount").value);
    const item   = $("item").value.trim();
    if(!amount || amount<=0){ toast("Enter an amount","err"); $("amount").focus(); return; }
    if(!item){ toast("What was it?","err"); $("item").focus(); return; }

    const payload = {
      idToken,
      date: $("date").value,
      item,
      category: $("category").value,
      amount,
      paidBy: getPaidBy(),
      split:  getSplit(),
      payment: $("payment").value,
      impulse: $("impulse").checked,
      notes: $("notes").value.trim()
    };

    const btn = $("save");
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span> Saving…';

    try{
      // Apps Script web apps don't return CORS headers for custom-type
      // requests, so we send as text/plain (a "simple" request) and the
      // script parses the JSON body.
      const r = await fetch(ENDPOINT, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      const data = await r.json();
      if(data && data.ok){
        recent.unshift(payload); renderRecent();
        toast("Added ₹"+amount.toLocaleString("en-IN"),"ok");
        // reset for the next entry
        $("amount").value=""; $("item").value=""; $("notes").value="";
        $("impulse").checked=false; $("impulseRow").classList.remove("on");
        $("amount").focus();
      } else {
        toast(data && data.error==="unauthorized" ? "Not authorised — wrong account?" : "Could not save","err");
      }
    }catch(e){
      toast("Network error — try again","err");
    }finally{
      btn.disabled=false; btn.textContent="Add expense";
    }
  };

  // register service worker (offline shell + installable)
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
</script>
</body>
</html>
