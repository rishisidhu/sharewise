<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#3D2645" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Sharewise" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icon-192.png" />
<title>Sharewise</title>
<script src="config.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --plum:#3D2645; --plum2:#5A3B66; --gold:#C9A227; --gold-deep:#A8851A;
    --cream:#F7F3EC; --soft:#EDE6DB; --ink:#2B2230; --paper:#FCFAF6;
    --muted:#9b8f86; --line:#E4DBCD; --ok:#3F7D5A; --err:#A8425B;
    --radius:14px; --tabbar:64px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--cream); color:var(--ink);
    min-height:100vh; min-height:100dvh;
  }

  #gate{position:fixed; inset:0; background:var(--plum); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; z-index:50;}
  #gate .eyebrow{font-size:12px; letter-spacing:3px; color:var(--gold); font-weight:700;}
  #gate h1{font-family:Georgia,serif; font-size:40px; margin:8px 0 4px; font-weight:700;}
  #gate p{color:#cbb9d4; font-size:14px; max-width:300px; line-height:1.5; margin:0 0 28px;}
  #gate .mark{width:64px; height:64px; border-radius:18px; background:var(--gold); color:var(--plum); display:grid; place-items:center; font-family:Georgia,serif; font-weight:700; font-size:32px; margin-bottom:18px; box-shadow:0 8px 24px rgba(0,0,0,.25);}
  #gateMsg{margin-top:18px; font-size:13px; color:#e6b8c4; min-height:18px;}

  header.bar{ background:var(--plum); color:#fff; padding:calc(env(safe-area-inset-top) + 16px) 18px 14px; }
  .bar-top{max-width:560px; margin:0 auto; display:flex; align-items:center; justify-content:space-between;}
  .bar-top .eyebrow{font-size:11px; letter-spacing:2px; color:var(--gold); font-weight:700;}
  .bar-top h1{font-family:Georgia,serif; font-size:22px; margin:2px 0 0; font-weight:700;}
  .who{display:flex; align-items:center; gap:8px; font-size:12px; color:#cbb9d4;}
  .who img{width:30px; height:30px; border-radius:50%; border:2px solid var(--gold);}
  .signout{background:none; border:none; color:#cbb9d4; font-size:11px; text-decoration:underline; cursor:pointer; padding:0;}

  main{max-width:560px; margin:0 auto; padding:18px 16px calc(var(--tabbar) + env(safe-area-inset-bottom) + 24px);}
  .screen{display:none;} .screen.active{display:block;}

  .card{background:var(--paper); border:1px solid var(--soft); border-radius:var(--radius); padding:18px; margin-bottom:16px;}
  .card h2{font-family:Georgia,serif; font-size:16px; color:var(--plum); margin:0 0 12px;}

  label.field{display:block; margin-bottom:14px;}
  label.field > span{display:block; font-size:12px; font-weight:600; color:var(--plum2); margin-bottom:5px;}
  input,select,textarea{width:100%; padding:12px 13px; border:1px solid var(--line); border-radius:10px; background:#fff; font-size:16px; color:var(--ink); outline:none; font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:var(--plum2); box-shadow:0 0 0 3px rgba(90,59,102,.12);}
  textarea{resize:vertical; min-height:48px;}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  .amount-hero{margin-bottom:16px;}
  .amount-hero span.lab{font-size:12px; font-weight:600; color:var(--plum2); display:block; margin-bottom:4px;}
  .amount-wrap{display:flex; align-items:center; gap:6px; border:1px solid var(--line); border-radius:12px; background:#fff; padding:6px 14px;}
  .amount-wrap:focus-within{border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,39,.15);}
  .amount-wrap .rs{font-family:Georgia,serif; font-size:30px; color:var(--plum2);}
  .amount-wrap input{border:none; box-shadow:none !important; font-family:Georgia,serif; font-size:34px; font-weight:700; color:var(--plum); padding:6px 0;}

  .seg{display:flex; gap:6px;}
  .seg button{flex:1; padding:10px 4px; border:1px solid var(--line); background:#fff; border-radius:10px; font-size:13px; font-weight:600; color:var(--plum2); cursor:pointer; font-family:inherit;}
  .seg button.on{background:var(--plum); color:#fff; border-color:var(--plum);}
  .seg.gold button.on{background:var(--gold); color:var(--ink); border-color:var(--gold-deep);}

  .impulse{display:flex; align-items:center; gap:10px; padding:12px 14px; border:1px solid var(--line); border-radius:10px; cursor:pointer; margin-bottom:6px; background:#fff;}
  .impulse.on{background:#fbf1d6; border-color:var(--gold);} .impulse input{width:auto;} .impulse span{font-size:14px;}

  .submit{width:100%; margin-top:6px; padding:15px; border:none; border-radius:12px; background:var(--plum); color:#fff; font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit;}
  .submit:disabled{opacity:.55;}
  .submit .spin{width:18px; height:18px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}

  .kpis{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .kpi{background:var(--paper); border:1px solid var(--soft); border-radius:12px; padding:14px;}
  .kpi .l{font-size:11px; font-weight:600; color:var(--plum2); letter-spacing:.3px;}
  .kpi .v{font-family:Georgia,serif; font-size:22px; font-weight:800; color:var(--plum); margin-top:4px;}

  .settle{background:var(--plum); color:#fff; border-radius:14px; padding:16px; text-align:center; margin-bottom:16px;}
  .settle .s{font-size:12px; color:#cbb9d4;} .settle .v{font-family:Georgia,serif; font-size:20px; font-weight:800; margin-top:4px;}
  .settle .v b{color:var(--gold);}

  .bar-row{margin-bottom:11px;}
  .bar-row .top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;}
  .bar-row .top .amt{font-weight:700; color:var(--plum);}
  .track{height:9px; background:var(--soft); border-radius:6px; overflow:hidden;}
  .fill{height:100%; border-radius:6px; background:var(--gold);}

  .trend{display:flex; align-items:flex-end; gap:10px; height:130px;}
  .trend .col{flex:1; text-align:center;}
  .trend .col .t{font-size:10px; color:var(--plum2); margin-bottom:3px;}
  .trend .col .b{background:var(--plum); border-radius:6px 6px 0 0; min-height:4px;}
  .trend .col .m{font-size:10px; color:var(--muted); margin-top:4px;}

  .twosplit{display:flex; gap:12px; margin-bottom:16px;}
  .twosplit .p{flex:1; background:var(--paper); border:1px solid var(--soft); border-radius:12px; padding:14px;}
  .twosplit .p .n{font-size:13px; font-weight:700; color:var(--plum2);}
  .twosplit .p .sub{font-size:11px; color:var(--muted); margin-top:8px;}
  .twosplit .p .val{font-family:Georgia,serif; font-size:18px; font-weight:800;}
  .twosplit .p .paid{color:var(--plum);} .twosplit .p .fair{color:var(--gold-deep);}

  .tx{display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--soft);}
  .tx:last-child{border-bottom:none;}
  .tx .dot{width:6px; align-self:stretch; border-radius:4px; background:var(--gold);}
  .tx .m{flex:1; min-width:0;}
  .tx .m .t{font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tx .m .s{font-size:11.5px; color:var(--muted);}
  .tx .a{font-family:Georgia,serif; font-weight:700; color:var(--plum);}

  .muted{color:var(--muted); font-size:13px;}
  .center{text-align:center;}
  .hidden{display:none !important;}
  .chartbox{position:relative; height:240px;}

  .shim{background:linear-gradient(90deg,#eee 25%,#f5f5f5 37%,#eee 63%); background-size:400% 100%; animation:sh 1.2s infinite; border-radius:8px; height:14px;}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

  nav.tabbar{position:fixed; left:0; right:0; bottom:0; height:calc(var(--tabbar) + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom); background:#fff; border-top:1px solid var(--line); display:flex; z-index:40;}
  nav.tabbar button{flex:1; border:none; background:none; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--muted); font-size:11px; font-weight:600; padding-top:8px;}
  nav.tabbar button.on{color:var(--plum);}
  nav.tabbar button svg{width:24px; height:24px;}
  nav.tabbar button.on svg{stroke:var(--gold);}

  #toast{position:fixed; left:50%; bottom:calc(var(--tabbar) + env(safe-area-inset-bottom) + 16px); transform:translateX(-50%) translateY(20px); background:var(--plum); color:#fff; padding:13px 20px; border-radius:12px; font-size:14px; font-weight:600; box-shadow:0 10px 30px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:.25s; z-index:60; max-width:90vw; text-align:center;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  #toast.ok{background:var(--ok);} #toast.err{background:var(--err);}
</style>
</head>
<body>

<div id="gate">
  <div class="mark">S</div>
  <div class="eyebrow">HOUSEHOLD LEDGER</div>
  <h1>Sharewise</h1>
  <p>Log an expense in seconds. It lands straight in your shared sheet, where the analysis lives.</p>
  <div id="gbtn"></div>
  <div id="gateMsg"></div>
</div>

<div id="app" class="hidden">
  <header class="bar">
    <div class="bar-top">
      <div>
        <div class="eyebrow">HOUSEHOLD LEDGER</div>
        <h1 id="screenTitle">Add an expense</h1>
      </div>
      <div class="who">
        <img id="avatar" alt="" />
        <div><div id="whoName"></div><button class="signout" id="signout">sign out</button></div>
      </div>
    </div>
  </header>

  <main>
    <section class="screen active" id="screen-add">
      <div class="card">
        <div class="amount-hero">
          <span class="lab">Amount</span>
          <div class="amount-wrap"><span class="rs">₹</span><input id="amount" type="number" inputmode="decimal" placeholder="0" /></div>
        </div>
        <label class="field"><span>What was it?</span><input id="item" type="text" placeholder="e.g. Swiggy dinner, diapers, electricity" /></label>
        <label class="field"><span>Category</span><select id="category"></select></label>
        <div class="row">
          <label class="field"><span>Date</span><input id="date" type="date" /></label>
          <label class="field"><span>Payment</span><select id="payment"><option>UPI</option><option>Card</option><option>Cash</option><option>Net Banking</option></select></label>
        </div>
        <label class="field"><span>Who paid?</span><div class="seg" id="paidBy"><button data-v="You">You</button><button data-v="Wife">Wife</button><button data-v="Shared" class="on">Shared</button></div></label>
        <label class="field"><span>Whose expense? (split)</span><div class="seg gold" id="split"><button data-v="You">You</button><button data-v="Wife">Wife</button><button data-v="Shared" class="on">Shared</button></div></label>
        <label class="impulse" id="impulseRow"><input id="impulse" type="checkbox" /><span>Impulse buy?</span></label>
        <label class="field" style="margin-top:14px;"><span>Notes (optional)</span><textarea id="notes" placeholder="anything worth remembering"></textarea></label>
        <button class="submit" id="save">Add expense</button>
      </div>
      <p class="muted center">Saved to your shared Google Sheet.</p>
    </section>

    <section class="screen" id="screen-insights">
      <div id="insightsBody">
        <div class="card"><div class="shim" style="width:60%; margin-bottom:10px;"></div><div class="shim" style="width:90%;"></div></div>
      </div>
      <p class="muted center">Highlights from your sheet.</p>
      <a id="sheetLink" href="#" target="_blank" rel="noopener" style="display:none; margin:4px auto 0; max-width:260px; padding:12px; border:1px solid var(--line); border-radius:11px; background:#fff; color:var(--plum); font-weight:600; font-size:14px; text-align:center; text-decoration:none;">Open full sheet &amp; analysis &#8599;</a>
    </section>
  </main>

  <nav class="tabbar">
    <button id="tab-add" class="on" data-screen="add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add
    </button>
    <button id="tab-insights" data-screen="insights">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Insights
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
  const ENDPOINT  = (window.SHAREWISE_CONFIG && window.SHAREWISE_CONFIG.endpoint)  || "";
  const CLIENT_ID = (window.SHAREWISE_CONFIG && window.SHAREWISE_CONFIG.clientId) || "";

  // Fixed identity per email. Roles ("You"/"Wife") are what gets STORED in the
  // sheet and must stay constant regardless of who signs in; only the display
  // NAME changes. Edit names here if you like.
  const PEOPLE_MAP = {
    "rishirajsidhu@gmail.com": { role: "You",  name: "Rishi" },
    "ragini.chaurasia@gmail.com": { role: "Wife", name: "Ragini" }
  };
  // role -> display name (built from the map)
  const ROLE_NAME = { You: "You", Wife: "Wife", Shared: "Shared" };
  Object.keys(PEOPLE_MAP).forEach(function(e){ ROLE_NAME[PEOPLE_MAP[e].role] = PEOPLE_MAP[e].name; });

  // Google Sheet link (opens in a new tab from the app)
  const SHEET_URL = (window.SHAREWISE_CONFIG && window.SHAREWISE_CONFIG.sheetUrl) || "";
  let idToken = null;
  let insightsLoaded = false;
  const $ = (id) => document.getElementById(id);
  const inr = (n) => "\u20B9" + Math.round(Number(n)||0).toLocaleString("en-IN");

  let toastTimer;
  function toast(msg, kind){ const t=$("toast"); t.textContent=msg; t.className="show "+(kind||""); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className=(kind||""),2600); }

  function decodeJwt(tok){ try{ return JSON.parse(atob(tok.split(".")[1].replace(/-/g,"+").replace(/_/g,"/"))); }catch(e){ return {}; } }

  function onSignIn(resp){
    idToken = resp.credential;
    const p = decodeJwt(idToken);
    $("avatar").src = p.picture || "";
    $("whoName").textContent = (p.given_name || p.name || "").split(" ")[0];
    relabelPeople();
    setupSheetLink();
    $("gate").classList.add("hidden");
    $("app").classList.remove("hidden");
    loadBootstrap();
  }

  window.onload = function(){
    $("date").value = new Date().toISOString().slice(0,10);
    if(!ENDPOINT || !CLIENT_ID){ $("gateMsg").textContent="App not configured yet \u2014 set the endpoint and client ID in Vercel."; return; }
    const ready = setInterval(()=>{
      if(window.google && google.accounts && google.accounts.id){
        clearInterval(ready);
        google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onSignIn });
        google.accounts.id.renderButton($("gbtn"), { theme:"filled_black", size:"large", shape:"pill", text:"continue_with", width:260 });
      }
    }, 120);
  };

  $("signout").onclick = function(){
    idToken=null; insightsLoaded=false; window.__last=null;
    if(window.google && google.accounts) google.accounts.id.disableAutoSelect();
    $("app").classList.add("hidden"); $("gate").classList.remove("hidden");
  };

  function wireSeg(id){ const grp=$(id); grp.querySelectorAll("button").forEach(b=>{ b.onclick=(e)=>{ e.preventDefault(); grp.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); }; }); return ()=>grp.querySelector("button.on").dataset.v; }
  const getPaidBy = wireSeg("paidBy");
  const getSplit  = wireSeg("split");

  // Relabel the segmented buttons to show real names (value stays the role).
  function relabelPeople(){
    ["paidBy","split"].forEach(function(id){
      $(id).querySelectorAll("button").forEach(function(b){
        b.textContent = ROLE_NAME[b.dataset.v] || b.dataset.v;
      });
    });
  }

  // Wire the "Open sheet" link if a sheet URL is configured.
  function setupSheetLink(){
    const el = $("sheetLink");
    if(!el) return;
    if(SHEET_URL){ el.href = SHEET_URL; el.style.display = ""; }
    else { el.style.display = "none"; }
  }
  $("impulseRow").addEventListener("click", ()=>{ setTimeout(()=>$("impulseRow").classList.toggle("on",$("impulse").checked),0); });

  function switchTab(name){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    $("screen-"+name).classList.add("active");
    document.querySelectorAll(".tabbar button").forEach(b=>b.classList.toggle("on", b.dataset.screen===name));
    $("screenTitle").textContent = name==="add" ? "Add an expense" : "Insights";
    if(name==="insights" && !insightsLoaded) loadInsights();
  }
  document.querySelectorAll(".tabbar button").forEach(b=>{ b.onclick=()=>switchTab(b.dataset.screen); });

  const FALLBACK = ["Groceries","Eating Out / Delivery","Blinkit / Quick-commerce","Baby","Rent / Housing","Utilities","Transport","Health","Shopping","Entertainment","Subscriptions","Travel","Other"];
  function fillCategories(list){ const sel=$("category"); const cur=sel.value; sel.innerHTML=""; (list&&list.length?list:FALLBACK).forEach(c=>{ const o=document.createElement("option"); o.textContent=c; sel.appendChild(o); }); if(cur) sel.value=cur; }

  async function apiGet(){
    const url = ENDPOINT + "?idToken=" + encodeURIComponent(idToken) + "&t=" + Date.now();
    const r = await fetch(url, { method:"GET" });
    return await r.json();
  }

  async function loadBootstrap(){
    fillCategories(FALLBACK);
    try{ const d = await apiGet(); if(d&&d.ok){ if(d.categories) fillCategories(d.categories); window.__last=d; } }catch(e){}
  }

  async function loadInsights(){
    const body = $("insightsBody");
    try{
      const d = (window.__last && window.__last.summary) ? window.__last : await apiGet();
      if(!d || !d.ok){ body.innerHTML = '<div class="card center muted">Could not load insights.</div>'; return; }
      window.__last = d; insightsLoaded = true; renderInsights(d);
    }catch(e){ body.innerHTML = '<div class="card center muted">Network error loading insights.</div>'; }
  }

  let _charts = [];
  function destroyCharts(){ _charts.forEach(c=>{ try{c.destroy();}catch(e){} }); _charts = []; }

  // palette for categories (stable-ish by index)
  const CHART_COLORS = ["#7C9A6B","#C9622E","#D4A017","#B5739E","#5A6B8C","#6B8E9E","#8C7B5A","#A8556B","#9B6B9E","#C97C9B","#7B8C9E","#5A8C7B","#8C8C8C"];
  const PLUM="#3D2645", GOLD="#C9A227";

  function renderInsights(d){
    const s = d.summary || {};
    const youOwe = Number(s["settle.you_owe"]||0);
    let settleHtml;
    if(Math.abs(youOwe) < 1) settleHtml = '<div class="v">All square \uD83E\uDD1D</div>';
    else if(youOwe > 0) settleHtml = '<div class="v">'+ROLE_NAME.You+' owes '+ROLE_NAME.Wife+' <b>'+inr(youOwe)+'</b></div>';
    else settleHtml = '<div class="v">'+ROLE_NAME.Wife+' owes '+ROLE_NAME.You+' <b>'+inr(-youOwe)+'</b></div>';

    const rec = d.recent||[];
    const roleName = function(x){ return ROLE_NAME[x] || x; };
    const recHtml = rec.length ? rec.map(e=>'<div class="tx"><div class="dot"></div><div class="m"><div class="t">'+esc(e.item)+(e.impulse?' <span style="color:#B5739E;font-size:10px">\u00B7 impulse</span>':'')+'</div><div class="s">'+e.date+' \u00B7 '+esc(e.category)+' \u00B7 '+(e.paidBy===e.split?roleName(e.paidBy):roleName(e.paidBy)+"\u2192"+roleName(e.split))+'</div></div><div class="a">'+inr(e.amount)+'</div></div>').join("")
      : '<p class="muted">No transactions yet.</p>';

    $("insightsBody").innerHTML =
      '<div class="kpis">'+
        '<div class="kpi"><div class="l">THIS MONTH</div><div class="v">'+inr(s["kpi.this_month"])+'</div></div>'+
        '<div class="kpi"><div class="l">AVG / MONTH</div><div class="v">'+inr(s["kpi.avg_month"])+'</div></div>'+
        '<div class="kpi"><div class="l">TOTAL TRACKED</div><div class="v">'+inr(s["kpi.total"])+'</div></div>'+
        '<div class="kpi"><div class="l">PROJECTED / YEAR</div><div class="v">'+inr(s["kpi.proj_year"])+'</div></div>'+
      '</div>'+
      '<div class="settle"><div class="s">Settle up</div>'+settleHtml+'<div class="s" style="margin-top:6px">Fair share = personal + half of shared</div></div>'+
      '<div class="twosplit">'+
        '<div class="p"><div class="n">'+ROLE_NAME.You+'</div><div class="sub">Paid</div><div class="val paid">'+inr(s["paid.You"])+'</div><div class="sub">Fair share</div><div class="val fair">'+inr(s["borne.You"])+'</div></div>'+
        '<div class="p"><div class="n">'+ROLE_NAME.Wife+'</div><div class="sub">Paid</div><div class="val paid">'+inr(s["paid.Wife"])+'</div><div class="sub">Fair share</div><div class="val fair">'+inr(s["borne.Wife"])+'</div></div>'+
      '</div>'+
      '<div class="card"><h2>This month by category</h2><div class="chartbox"><canvas id="chCat"></canvas></div></div>'+
      '<div class="card"><h2>Monthly spend &amp; mix (6 mo)</h2><div class="chartbox"><canvas id="chStack"></canvas></div></div>'+
      '<div class="card"><h2>Top category each month</h2><div class="chartbox"><canvas id="chWin"></canvas></div></div>'+
      '<div class="card"><h2>Impulse vs planned (6 mo)</h2><div class="chartbox"><canvas id="chImp"></canvas></div></div>'+
      '<div class="card"><h2>Recent transactions</h2>'+recHtml+'</div>';

    // defer chart drawing until canvases are in the DOM
    setTimeout(function(){ renderCharts(d); }, 0);
  }

  function renderCharts(d, _tries){
    _tries = _tries || 0;
    if(typeof Chart === "undefined"){
      if(_tries < 25){ return void setTimeout(()=>renderCharts(d, _tries+1), 200); } // wait up to ~5s
      document.querySelectorAll(".chartbox").forEach(box=>{
        const p=document.createElement("p"); p.className="muted center";
        p.style.margin="20px 0"; p.textContent="Charts unavailable (offline).";
        box.innerHTML=""; box.appendChild(p);
      });
      return;
    }
    destroyCharts();
    Chart.defaults.font.family = "-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif";
    Chart.defaults.font.size = 11;
    Chart.defaults.color = "#5A3B66";
    const rupee = (v)=>"\u20B9"+Math.round(v).toLocaleString("en-IN");
    const moLabel = (m)=>(m||"").slice(2); // "26-06"

    // 1) This month by category (horizontal bars, sorted desc)
    const cats = (d.catMonth||[]).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);
    const cEl = document.getElementById("chCat");
    if(cEl){
      if(!cats.length){ noData(cEl, "No spending this month yet."); }
      else _charts.push(new Chart(cEl, {
        type:"bar",
        data:{ labels:cats.map(c=>c.name),
          datasets:[{ data:cats.map(c=>c.amount),
            backgroundColor:cats.map((c,i)=>CHART_COLORS[i%CHART_COLORS.length]),
            borderRadius:6 }] },
        options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false},
            tooltip:{callbacks:{label:(x)=>rupee(x.raw)}} },
          scales:{ x:{ ticks:{callback:(v)=>rupee(v)}, grid:{color:"#EDE6DB"} },
                   y:{ grid:{display:false} } } }
      }));
    }

    // 2) Stacked monthly bars (categories) + total trend line overlay
    const st = d.stacked || {months:[],categories:[],data:[]};
    const sEl = document.getElementById("chStack");
    if(sEl){
      const months = st.months||[];
      const totals = months.map((_,j)=> (st.data||[]).reduce((sum,row)=>sum+(row[j]||0),0));
      const ds = (st.categories||[]).map((cat,i)=>({
        type:"bar", label:cat, data:(st.data[i]||[]),
        backgroundColor:CHART_COLORS[i%CHART_COLORS.length], stack:"s", borderWidth:0
      })).filter(x=>x.data.some(v=>v>0)); // only categories with any spend
      ds.push({ type:"line", label:"Total", data:totals, borderColor:PLUM,
        backgroundColor:PLUM, borderWidth:2, pointRadius:3, pointBackgroundColor:GOLD,
        tension:0.3, stack:"_none", order:0 });
      if(totals.every(v=>v===0)){ noData(sEl,"No data yet."); }
      else _charts.push(new Chart(sEl, {
        type:"bar",
        data:{ labels:months.map(moLabel), datasets:ds },
        options:{ responsive:true, maintainAspectRatio:false,
          interaction:{mode:"index",intersect:false},
          plugins:{ legend:{display:true, labels:{boxWidth:10, font:{size:10}}},
            tooltip:{callbacks:{label:(x)=>x.dataset.label+": "+rupee(x.raw)}} },
          scales:{ x:{ stacked:true, grid:{display:false} },
                   y:{ stacked:true, ticks:{callback:(v)=>rupee(v)}, grid:{color:"#EDE6DB"} } } }
      }));
    }

    // 3) Top category each month (bar; height=amount, label shows category)
    const win = d.winner||[];
    const wEl = document.getElementById("chWin");
    if(wEl){
      if(win.every(w=>!w.amount)){ noData(wEl,"No data yet."); }
      else {
        const wParent = wEl.parentElement;
        _charts.push(new Chart(wEl, {
          type:"bar",
          data:{ labels:win.map(w=>moLabel(w.month)),
            datasets:[{ data:win.map(w=>w.amount),
              backgroundColor:win.map((w,i)=>CHART_COLORS[i%CHART_COLORS.length]),
              borderRadius:6 }] },
          options:{ responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{display:false},
              tooltip:{callbacks:{
                title:(x)=>win[x[0].dataIndex].month,
                label:(x)=>{ const w=win[x.dataIndex]; return (w.name||"\u2014")+": "+rupee(w.raw||w.amount); } }} },
            scales:{ x:{grid:{display:false}}, y:{ticks:{callback:(v)=>rupee(v)}, grid:{color:"#EDE6DB"}} } }
        }));
        // category-name annotations under bars
        const cap = document.createElement("div");
        cap.style.cssText="display:flex;justify-content:space-around;font-size:10px;color:#9b8f86;margin-top:6px";
        cap.innerHTML = win.map(w=>'<span style="flex:1;text-align:center">'+(w.amount?esc(w.name):"\u2014")+'</span>').join("");
        if(wParent) wParent.appendChild(cap);
      }
    }

    // 4) Impulse vs planned per month (stacked bars)
    const imp = d.impulse||[];
    const iEl = document.getElementById("chImp");
    if(iEl){
      if(imp.every(m=>!m.impulse && !m.planned)){ noData(iEl,"No data yet."); }
      else _charts.push(new Chart(iEl, {
        type:"bar",
        data:{ labels:imp.map(m=>moLabel(m.month)),
          datasets:[
            { label:"Impulse", data:imp.map(m=>m.impulse), backgroundColor:"#B5739E", stack:"s", borderRadius:4 },
            { label:"Planned", data:imp.map(m=>m.planned), backgroundColor:"#7C9A6B", stack:"s", borderRadius:4 }
          ] },
        options:{ responsive:true, maintainAspectRatio:false,
          interaction:{mode:"index",intersect:false},
          plugins:{ legend:{display:true, labels:{boxWidth:10}},
            tooltip:{callbacks:{label:(x)=>x.dataset.label+": "+rupee(x.raw)}} },
          scales:{ x:{stacked:true, grid:{display:false}},
                   y:{stacked:true, ticks:{callback:(v)=>rupee(v)}, grid:{color:"#EDE6DB"}} } }
      }));
    }
  }

  function noData(canvas, msg){
    const p = document.createElement("p"); p.className="muted center"; p.textContent=msg;
    p.style.margin="20px 0"; canvas.parentElement.replaceChild(p, canvas);
  }

  function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  $("save").onclick = async function(){
    const amount = Number($("amount").value);
    const item = $("item").value.trim();
    if(!amount||amount<=0){ toast("Enter an amount","err"); $("amount").focus(); return; }
    if(!item){ toast("What was it?","err"); $("item").focus(); return; }
    const payload = { idToken, date:$("date").value, item, category:$("category").value, amount, paidBy:getPaidBy(), split:getSplit(), payment:$("payment").value, impulse:$("impulse").checked, notes:$("notes").value.trim() };
    const btn=$("save"); btn.disabled=true; btn.innerHTML='<span class="spin"></span> Saving\u2026';
    try{
      const r = await fetch(ENDPOINT, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body:JSON.stringify(payload) });
      const data = await r.json();
      if(data && data.ok){
        toast("Added "+inr(amount),"ok");
        $("amount").value=""; $("item").value=""; $("notes").value=""; $("impulse").checked=false; $("impulseRow").classList.remove("on");
        $("amount").focus();
        insightsLoaded=false; window.__last=null;
      } else {
        toast(data&&data.error==="unauthorized" ? "Not authorised \u2014 wrong account?" : "Could not save","err");
      }
    }catch(e){ toast("Network error \u2014 try again","err"); }
    finally{ btn.disabled=false; btn.textContent="Add expense"; }
  };

  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
